<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../images/clariva-logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Clariva Bank — Sign In</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        background-color: #000000;
        color: rgb(248, 245, 239);
        font-family: "DM Sans", Arial, sans-serif;
    }

    .signin-wrapper {
        min-height: 100vh;
        padding: 0px 5%;
        background:
            linear-gradient(90deg, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.74) 45%, rgba(0, 0, 0, 0.82) 100%),
            url("../images/7b93411f-f31e-410a-948a-2082370e4ae7.png") center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-bottom: 40px;
    }

    .logo img {
        width: 50px;
        border-radius: 50%;
        height: 47px;
    }

    .logo h1 {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 22px;
        font-weight: 300;
        line-height: 35.2px;
        color: rgb(248, 245, 239);
    }


    .logo span {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 22px;
        font-weight: 300;
        line-height: 35.2px;
        color: rgb(201, 168, 76);
    }

    .content {
        width: 500px;
        background: transparent;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 45px 32px;
        border-radius: 8px;
        border: 0.5px solid #2e2810;

    }


    .content h2 {
        font-size: 22px;
        font-weight: 500;
        font-family: sans-serif;
        color: #f0ebe0;
        margin-bottom: 15px;
    }

    .content .subtitle {
        font-size: 15px;
        color: #5a5040;
        margin-bottom: 2rem;
    }

    .field {
        margin-bottom: 16px;
    }

    .field label {
        display: block;
        font-size: 14px;
        color: #7a6830;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 6px;
    }

    .input-wrap {
        position: relative;
    }

    .input-wrap i.left-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #4a3e20;
        pointer-events: none;
    }

    .input-wrap input {
        width: 100%;
        background: #1e1c14;
        border: 0.5px solid #2e2810;
        border-radius: 8px;
        padding: 12px 14px 12px 40px;
        font-size: 14px;
        color: #d4c898;
        outline: none;
    }


    .input-wrap input:focus {
        border-color: #C49A19;
        box-shadow: 0 0 0 2px rgba(196, 154, 25, 0.15);
    }

    .input-wrap input.has-toggle {
        padding-right: 38px;
    }

    .toggle-btn {
        position: absolute;
        right: 9px;
        top: 52%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        padding: 2px;
        color: #4a3e20;
    }


    .bi-eye-slash {
        position: absolute;
        right: 3px;
        top: 52%;
        transform: translateY(-50%);
    }

    .toggle-btn i {
        font-size: 16px;
    }

    .forgot-row {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1.5rem;
    }

    .forgot-row a {
        font-size: 12px;
        color: #C49A19;
        text-decoration: none;
    }

    .forgot-row a:hover {
        color: #e8b820;
    }

    .btn-primary {
        width: 100%;
        background: #C49A19;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        font-weight: 500;
        color: #0d0d0d;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:disabled {
        background: #a37f15;
        cursor: not-allowed;
        transform: none;
    }

    .btn-primary:hover {
        background: #d9aa1e;
    }

    .btn-primary:active {
        transform: scale(0.98);
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 1.25rem 0;
    }

    .divider hr {
        flex: 1;
        border: none;
        border-top: 0.5px solid #2a2210;
    }

    .divider span {
        font-size: 12px;
        color: #3e3420;
    }

    .btn-secondary {
        width: 100%;
        background: transparent;
        border: 0.5px solid #2e2810;
        border-radius: 8px;
        padding: 11px;
        font-size: 13px;
        color: #7a6830;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: border-color 0.15s, color 0.15s;
    }

    .btn-secondary:hover {
        border-color: #4a3e20;
        color: #c0a060;
    }

    .btn-secondary i {
        font-size: 16px;
    }

    .register-cta {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.351);
        text-align: center;
        margin-top: 1.5rem;
        line-height: 1.6;
    }

    .register-cta a {
        color: #C49A19;
        text-decoration: none;
    }

    .register-cta a:hover {
        color: #e8b820;
    }
</style>

<body>
    <div class="signin-wrapper">

        <div class="content">
            <div class="logo"><img src="../images/clariva-logo.png" alt="">
                <h1>Clariva <span>Bank</span></h1>
            </div>
            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your account</p>

            <div class="field">
                <label for="account">Email Address</label>
                <div class="input-wrap">
                    <i class="ti ti-user left-icon"></i>
                    <input type="email" id="email" placeholder="Enter your account or email" />
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>

                <div class="input-wrap">
                    <i class="ti ti-lock left-icon"></i>

                    <input type="password" id="password" class="has-toggle" placeholder="Enter your password" />

                    <button class="toggle-btn" id="signin" aria-label="Toggle password visibility">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                        <i class="bi bi-eye-slash" id="eyeSlashIcon"></i>

                    </button>
                </div>
            </div>

            <div class="forgot-row">
                <a href="#">Forgot password?</a>
            </div>

            <button class="btn-primary" id="signInBtn">Sign in to Clariva</button>

            <div class="divider">
                <hr /><span>or</span>
                <hr />
            </div>

            <button class="btn-secondary" id="googleSignInBtn">
                <img src="../images/google.svg" alt="">
                Continue with Google
            </button>

            <p class="register-cta">
                New to Clariva? <a href="../signUp and signIn/signup.html">Create an account</a>
            </p>
        </div>

    </div>

    <script src="../js/signIn.js"></script>
    <script type="module" src="../firebase/signInFb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
