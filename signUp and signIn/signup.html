<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../images/clariva-logo.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <title>Clariva Bank — Sign Up</title>

</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

body {
    background-color: black;
    /* background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                url('');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: right;  */
}

    .content {
    width: 600px;
    max-width: 92vw;
    margin: 40px auto;
    background: rgba(17, 17, 17, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    padding: 32px 42px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

    .form-header {
        margin-bottom: 24px;
    }

    .form-title {
        font-size: 26px;
        font-weight: 500;
        color: #f5f0e8;
        margin-bottom: 4px;
    }

    .form-subtitle {
        font-size: 16px;
        color: #666;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .form-group {
        margin-bottom: 12px;
    }

    .form-group.full {
        grid-column: span 2;
    }

    label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 6px;
    }

    .input-wrap {
        position: relative;
    }

    .input-wrap i.left-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #444;
        pointer-events: none;
    }

    .input-wrap i.left-icons {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #444;
        pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="password"],
    select {
        width: 100%;
        height: 40px;
        background: #1a1a1a;
        border: 0.5px solid #2a2a2a;
        border-radius: 4px;
        color: #e8e0cc;
        font-size: 17px;
        padding: 0 12px 0 36px;
        outline: none;
        font-family: inherit;
        transition: border-color 0.2s;
        -webkit-appearance: none;
        color-scheme: dark;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus {
        border-color: #C9A84C;
    }


    select option {
        background: #1a1a1a;
    }

    .phone-wrap {
        display: flex;
        gap: 8px;
    }

    .phone-wrap select {
        width: 90px;
        flex-shrink: 0;
        padding-left: 10px;
    }

    .phone-wrap .input-wrap {
        flex: 1;
    }

    .gender-row {
        display: flex;
        gap: 8px;
    }

    .gender-btn {
        flex: 1;
        height: 40px;
        background: #1a1a1a;
        border: 0.5px solid #2a2a2a;
        border-radius: 4px;
        color: #666;
        font-size: 16px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.04em;
    }

    .gender-btn:hover {
        border-color: #C9A84C;
        color: #C9A84C;
    }

    .gender-btn.active {
        background: #1e1a0f;
        border-color: #C9A84C;
        color: #C9A84C;
    }


    .input-wrap i.right-icon {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #444;
        cursor: pointer;
    }

    .bi-eye-slash {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #444;
        cursor: pointer;
    }

    .agree-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 14px;
        margin-top: 2px;
    }

    .agree-row input[type="checkbox"] {
        width: 14px;
        height: 14px;
        min-width: 14px;
        padding: 0;
        margin-top: 2px;
        accent-color: #C9A84C;
    }

    .agree-row span {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
    }

    .agree-row a {
        color: #C9A84C;
        text-decoration: none;
    }

    .btn-primary {
        width: 100%;
        height: 44px;
        background: #C9A84C;
        border: none;
        border-radius: 4px;
        color: #0d0d0d;
        font-size: 17px;
        font-weight: 500;
        font-family: inherit;
        letter-spacing: 0.08em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 14px;
        transition: background 0.2s;
    }

    .btn-primary:hover {
        background: #d9b85c;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
    }

    .divider-line {
        flex: 1;
        height: 0.5px;
        background: #2a2a2a;
    }

    .divider span {
        font-size: 14px;
        color: #444;
    }

    .btn-google {
        width: 100%;
        height: 40px;
        background: transparent;
        border: 0.5px solid #2a2a2a;
        border-radius: 4px;
        color: rgba(255, 217, 0, 0.525);
        font-size: 15px;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: border-color 0.2s;
    }

    .btn-google:hover {
        border-color: #444;
        color: #aaa;
    }



    .signin-link {
        text-align: center;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.548);
        margin-top: 12px;
    }

    .signin-link a {
        color: #C9A84C;
        text-decoration: none;
    }

    /* SweetAlert2 Dark Theme Customization */
    .swal2-popup {
        background: #111 !important;
        color: #f5f0e8 !important;
        border: 1px solid #2a2a2a;
    }
    .swal2-title, .swal2-html-container {
        color: #f5f0e8 !important;
    }
    .swal2-confirm {
        background-color: #007bff !important;
        color: #0d0d0d !important;
    }
</style>

<body>

    <div class="content">
        <div class="form-header">
            <div class="form-title">Open your account</div>
            <div class="form-subtitle">Takes less than 2 minutes to get started</div>
        </div>

        <div class="form-row">

            <!-- Full Name -->
            <div class="form-group full">
                <label for="first-name">full Name</label>
                <div class="input-wrap">
                    <i class="ti ti-user left-icon" aria-hidden="true"></i>

                    <input type="text" id="fullname" placeholder="Aserere Joshua">
                </div>
            </div>


            <!-- Email -->
            <div class="form-group full">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <i class="ti ti-mail left-icon" aria-hidden="true"></i>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>
            </div>

            <!-- Phone -->
            <div class="form-group full">
                <label>Phone number</label>
                <div class="phone-wrap">
                    <div class="input-wrap">
                        <i class="ti ti-phone left-icon" aria-hidden="true"></i>
                        <input type="number" placeholder="091-0609-8341" id="phonenumber">
                    </div>
                </div>
            </div>


            <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>
                <div class="gender-row" id="genderRow">
                    <button class="gender-btn active"
                        onclick="this.parentElement.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">Male</button>
                    <button class="gender-btn"
                        onclick="this.parentElement.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active')">Female</button>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group full">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <i class="ti ti-lock left-icons" aria-hidden="true"></i>
                    <input type="password" id="password" placeholder="Min. 8 characters">
                    <i class="bi bi-eye right-icon" id="eyeIcon"></i>
                    <i class="bi bi-eye-slash" id="eyeSlashIcon"></i>
                </div>
            </div>

            <div class="form-group full">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrap">
                    <i class="ti ti-lock left-icons" aria-hidden="true"></i>
                    <input type="password" id="confirmPassword" placeholder="Min. 8 characters">
                    <i class="bi bi-eye right-icon" id="eyeIcons"></i>
                    <i class="bi bi-eye-slash" id="eyeSlashIcons"></i>
                </div>
            </div>

        </div>

        <!-- Terms -->
        <div class="agree-row">
            <input type="checkbox" id="agree">
            <span>I agree to Clariva's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I confirm I
                am 18 years or older.</span>
        </div>

        <!-- Submit -->
        <button class="btn-primary" id="signup">
            Open my account <i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>

        <!-- Divider -->
        <div class="divider">
            <div class="divider-line"></div>
            <span>or continue with</span>
            <div class="divider-line"></div>
        </div>



        <!-- Google -->
        <button class="btn-google" id="googleSignUpBtn">
            <img src="../images/google.svg" alt="image">
            Continue with Google
        </button>

        <div class="signin-link">Already have an account? <a href="../signUp and signIn/signIn.html">Sign in →</a></div>
    </div>



    <script src="../js/signUp.js"></script>
    <script type="module" src="../firebase/signUpFb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
